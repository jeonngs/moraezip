<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>leave a note — moraezip</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;700&family=JetBrains+Mono:wght@400;700&family=Noto+Sans+KR:wght@100;300;400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body class="page-section">

  <div class="mobile-brand"><a href="index.html">moraezip</a></div>
  <div class="ambient-crumb"><a href="index.html">← moraezip</a> &nbsp;/&nbsp; leave a note</div>
  <div class="ambient-time" id="time">—</div>

  <main class="exhibition-frame">

    <section class="panel-optic">
      <a href="index.html" class="panel-link"><img class="panel-image" src="images/portrait.jpg" alt="portrait"></a>
      <div class="signature-script">note</div>
    </section>

    <section class="panel-data">
      <header class="meta-header">
        <span>Leave a Note</span>
        <span id="sys-date"></span>
      </header>

      <nav class="control-index">
        <a class="index-item" href="index.html"><span class="item-num">00</span><span class="item-label">Home</span></a>
        <a class="index-item" href="notes.html"><span class="item-num">01</span><span class="item-label">Notes</span></a>
        <a class="index-item" href="archives.html"><span class="item-num">02</span><span class="item-label">Archives</span></a>
        <a class="index-item" href="calendar.html"><span class="item-num">03</span><span class="item-label">Calendar</span></a>
        <a class="index-item active" href="leave.html"><span class="item-num">04</span><span class="item-label">Leave a note</span></a>
      </nav>

      <form class="note-form" id="note-form">
        <label class="note-field">
          <textarea name="message" rows="8" required placeholder="여기에 적어주세요…"></textarea>
        </label>

        <div class="note-actions">
          <button type="submit" class="note-submit">Send →</button>
          <span class="note-hint" id="note-hint">Opens your mail app.</span>
        </div>
      </form>
    </section>

  </main>

  <script>
    const t = document.getElementById('time');
    const render = () => {
      const d = new Date();
      let h = d.getHours(), m = d.getMinutes();
      const ap = h >= 12 ? 'p.m.' : 'a.m.';
      h = h % 12 || 12;
      t.textContent = `${h}:${String(m).padStart(2,'0')} ${ap}`;
    };
    render(); setInterval(render, 30000);

    const sysDateEl = document.getElementById('sys-date');
    if (sysDateEl) {
      const months = ['JAN','FEB','MAR','APR','MAY','JUN','JUL','AUG','SEP','OCT','NOV','DEC'];
      const dt = new Date();
      sysDateEl.textContent = `${months[dt.getMonth()]} ${String(dt.getDate()).padStart(2,'0')}, ${dt.getFullYear()}`;
    }

    const TO = 'sy.jeong@mindcarelab.co.kr';

    const form = document.getElementById('note-form');
    const hint = document.getElementById('note-hint');
    form.addEventListener('submit', e => {
      e.preventDefault();
      const message = form.message.value.trim();
      if (!message) return;

      const subject = 'moraezip — a note';
      const mailto = `mailto:${TO}?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(message + '\n')}`;
      window.location.href = mailto;

      hint.textContent = "Opened in your mail app. Thanks.";
    });
  </script>
</body>
</html>
