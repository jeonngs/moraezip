<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>post — moraezip</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;700&family=JetBrains+Mono:wght@400;700&family=Noto+Sans+KR:wght@100;300;400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="mobile-brand"><a href="index.html">moraezip</a></div>
  <div class="ambient-crumb" id="crumb"><a href="index.html">← moraezip</a></div>
  <div class="ambient-time" id="time">—</div>

  <main class="exhibition-frame">

    <section class="panel-optic">
      <img class="panel-image" src="images/portrait.jpg" alt="portrait">
      <div class="signature-script" id="sig-script">moraezip</div>
    </section>

    <section class="panel-data">
      <header class="meta-header">
        <span id="post-kind">Entry</span>
      </header>

      <article class="post-body" id="post-body">
        <p>loading…</p>
      </article>

      <footer class="post-foot" id="post-foot"></footer>
    </section>

  </main>

  <script src="posts.js"></script>
  <script>
    // Clock
    const t = document.getElementById('time');
    const renderTime = () => {
      const d = new Date();
      let h = d.getHours(), m = d.getMinutes();
      const ap = h >= 12 ? 'p.m.' : 'a.m.';
      h = h % 12 || 12;
      t.textContent = `${h}:${String(m).padStart(2,'0')} ${ap}`;
    };
    renderTime(); setInterval(renderTime, 30000);

    // Load post from ?id= (waits for posts.json to resolve)
    const params = new URLSearchParams(location.search);
    const id = params.get('id');

    const body = document.getElementById('post-body');
    const kindEl = document.getElementById('post-kind');
    const foot = document.getElementById('post-foot');
    const crumb = document.getElementById('crumb');
    const sig = document.getElementById('sig-script');

    window.POSTS_READY.then(() => {
      const post = id && window.POSTS ? window.POSTS[id] : null;

      if (!post) {
        body.innerHTML = `
          <h1 class="post-title">Not found</h1>
          <p class="post-excerpt">No entry with id <code>${id || '(none)'}</code>.</p>
        `;
        kindEl.textContent = '404';
        return;
      }

      const backHref = post.kind === 'note' ? 'notes.html' : 'archives.html';
      const backLabel = post.kind === 'note' ? 'notes' : 'archives';
      crumb.innerHTML = `<a href="index.html">moraezip</a> &nbsp;/&nbsp; <a href="${backHref}">${backLabel}</a> &nbsp;/&nbsp; <span>${id}</span>`;
      sig.textContent = post.kind === 'note' ? 'notes' : 'archives';
      document.title = `${post.title} — moraezip`;
      kindEl.textContent = post.kind === 'note' ? 'Journal Entry' : 'Archive Snippet';

      const hero = (post.kind === 'archive' && post.image)
        ? `<div class="post-hero"><img src="${post.image}" alt="${post.title}"></div>` : '';
      body.innerHTML = `
        <div class="post-date">${post.date}</div>
        <h1 class="post-title">${post.title}</h1>
        ${hero}
        ${post.body}
      `;

      foot.innerHTML = `<a class="post-back" href="${backHref}">← back to ${backLabel}</a>`;
    });
  </script>
</body>
</html>
