backend:
  name: git-gateway
  branch: main

media_folder: "images/uploads"
public_folder: "images/uploads"

locale: "en"

collections:
  - name: "posts"
    label: "Posts"
    files:
      - name: "all"
        label: "All posts (notes + archives)"
        file: "posts.json"
        format: "json"
        fields:
          - name: "posts"
            label: "Posts"
            label_singular: "Post"
            widget: "list"
            summary: "{{fields.shortDate}} · {{fields.kind}} · {{fields.title}}"
            fields:
              - { name: "id", label: "ID (고유값, 예: N05, A06)", widget: "string", hint: "각 글마다 고유해야 합니다. N=note, A=archive" }
              - { name: "kind", label: "종류", widget: "select", options: ["note", "archive"] }
              - { name: "date", label: "날짜", widget: "datetime", date_format: "YYYY-MM-DD", time_format: false, format: "YYYY-MM-DD" }
              - { name: "title", label: "제목", widget: "string" }
              - { name: "excerpt", label: "한줄 요약 (목록에 보이는 문장)", widget: "string" }
              - { name: "body", label: "본문", widget: "markdown" }
              - { name: "image", label: "대표 이미지 (archives만 권장)", widget: "image", required: false, allow_multiple: false }
              - { name: "source", label: "출처 (archives만)", widget: "string", required: false }
